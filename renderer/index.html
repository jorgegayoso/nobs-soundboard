function openBulkImportModal() {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" style="width:520px;">
        <h2>Bulk Import URLs</h2>
        <div class="modal-field">
          <label>Paste URLs (one per line)</label>
          <textarea id="bulkUrls" rows="8" placeholder="https://www.youtube.com/watch?v=...&#10;https://www.myinstants.com/instant/...&#10;https://..."
            style="width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-family:var(--font-mono);font-size:11px;padding:8px 10px;outline:none;resize:vertical;line-height:1.6;"></textarea>
        </div>
        <div class="modal-field">
          <label>Add to Category</label>
          <select id="bulkCategory">
            ${config.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="modal-field">
          <label>Button Color</label>
          <div class="color-options" id="bulkColors"></div>
        </div>
        <div id="bulkStatus" style="font-family:var(--font-mono);font-size:10px;color:var(--text-3);min-height:18px;margin-bottom:4px;"></div>
        <div class="modal-actions">
          <button class="cancel-btn" id="bulkCancel">Cancel</button>
          <button class="save-btn" id="bulkImport">Import</button>
        </div>
      </div>
    </div>
  `;

  // Color picker
  let bulkSelectedColor = 'gray';
  const bulkColorsEl = document.getElementById('bulkColors');

  Object.entries(PUCK_COLORS).forEach(([name, c]) => {
    const opt = document.createElement('div');
    opt.className = 'color-opt' + (name === 'gray' ? ' selected' : '');
    opt.style.background = c.main; opt.style.color = c.main;
    opt.dataset.color = name;
    opt.addEventListener('click', () => {
      bulkSelectedColor = name;
      bulkColorsEl.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    });
    bulkColorsEl.appendChild(opt);
  });

  // Custom colors
  config.customColors.forEach((hex) => {
    const opt = document.createElement('div');
    opt.className = 'color-opt';
    opt.style.background = hex; opt.style.color = hex;
    opt.dataset.color = hex;
    opt.addEventListener('click', () => {
      bulkSelectedColor = hex;
      bulkColorsEl.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    });
    bulkColorsEl.appendChild(opt);
  });

  document.getElementById('bulkCancel').addEventListener('click', closeModal);

  document.getElementById('bulkImport').addEventListener('click', async () => {
    const text = document.getElementById('bulkUrls').value.trim();
    if (!text) return;
    const urls = text.split(/\n+/).map(l => l.trim()).filter(l => l && (l.startsWith('http://') || l.startsWith('https://')));
    if (urls.length === 0) {
      document.getElementById('bulkStatus').textContent = 'No valid URLs found.';
      return;
    }

    const catId = document.getElementById('bulkCategory').value;
    const statusEl = document.getElementById('bulkStatus');
    const importBtn = document.getElementById('bulkImport');
    importBtn.disabled = true;
    importBtn.textContent = 'Importing...';

    let added = 0;
    for (let i = 0; i < urls.length; i++) {
      const url = urls[i];
      statusEl.textContent = `Resolving name ${i + 1}/${urls.length}...`;

      // Try to fetch the title from the URL
      let name = null;
      if (hasElectron && window.api.fetchUrlTitle) {
        try { name = await window.api.fetchUrlTitle(url); } catch(e) {}
      }

      // Fallback: extract name from URL
      if (!name) {
        name = extractNameFromUrl(url);
      }

      config.buttons.push({
        id: uid(), name: name, source: url,
        color: bulkSelectedColor, category: catId, keybind: '', favorite: false,
        volume: 100, gainDb: 0, loopInterval: null
      });
      added++;
    }

    statusEl.textContent = `Added ${added} sound${added !== 1 ? 's' : ''}!`;
    saveConfig(); renderAll();

    setTimeout(() => closeModal(), 800);
  });

  setupModalOverlayDismiss();
  document.getElementById('bulkUrls').focus();
}

function extractNameFromUrl(url) {
  try {
    const u = new URL(url);
    const host = u.hostname.replace('www.', '');

    // YouTube
    if (host.includes('youtube.com') || host.includes('youtu.be')) {
      const vParam = u.searchParams.get('v');
      if (vParam) return vParam; // will be replaced by fetched title
      const pathParts = u.pathname.split('/').filter(Boolean);
      return pathParts[pathParts.length - 1] || 'YouTube Sound';
    }

    // MyInstants
    if (host.includes('myinstants.com')) {
      const match = u.pathname.match(/\/instant\/([^/]+)/);
      if (match) return match[1].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // SoundCloud
    if (host.includes('soundcloud.com')) {
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) return parts[parts.length - 1].replace(/-/g, ' ');
    }

    // Generic: use last path segment
    const segments = u.pathname.split('/').filter(Boolean);
    if (segments.length > 0) {
      let name = segments[segments.length - 1];
      name = decodeURIComponent(name).replace(/[-_]/g, ' ').replace(/\.\w+$/, '');
      if (name.length > 3) return name;
    }

    return host;
  } catch(e) {
    return url.substring(0, 40);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// GLOBAL HOTKEYS (from main process via uiohook)
// ═══════════════════════════════════════════════════════════════════════
function handleGlobalInput(combo) {
  if (keybindListening) return;
  const btn = config.buttons.find(b => b.keybind && b.keybind.toLowerCase() === combo.toLowerCase());
  if (btn) {
    if (isUrl(btn.source) && !btn.resolvedPath) {
      downloadAndResolve(btn).then(path => { if (path) playSound(btn); });
    } else {
      playSound(btn);
    }
  }
}

// For keybind recording: live combo updates from uiohook
function handleKeybindComboUpdate(combo) {
  if (keybindListening && keybindCallback) {
    keybindCallback(combo, true); // true = final (key was pressed)
  }
}

// Modifier-only changes (live preview while recording)
function handleKeybindModifierChange(combo) {
  if (keybindListening && keybindLiveCallback && combo) {
    keybindLiveCallback(combo);
  }
}

// Modifier released without any non-modifier key: finalize as modifier-only keybind
function handleKeybindModifierRelease(combo) {
  if (keybindListening && keybindCallback && combo) {
    keybindCallback(combo, true);
  }
}

if (hasElectron) {
  window.api.onGlobalKeydown((combo) => handleGlobalInput(combo));
  window.api.onGlobalMousedown((combo) => handleGlobalInput(combo));
  // Keybind recording events
  window.api.onGlobalComboUpdate((combo) => handleKeybindComboUpdate(combo));
  window.api.onGlobalModifierChange((combo) => handleKeybindModifierChange(combo));
  window.api.onGlobalModifierRelease((combo) => handleKeybindModifierRelease(combo));
}

// Also handle keyboard within the app (for when uiohook isn't available)
let appHeldModifiers = { ctrl: false, shift: false, alt: false };
let modifierOnlyTimer = null;
let appPeakModifierCombo = ''; // tracks highest modifier combo reached
let appHadNonModifier = false; // true if a non-modifier key was pressed during this hold

document.addEventListener('keydown', (e) => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (keybindListening && keybindCallback) {
    e.preventDefault();
    clearTimeout(modifierOnlyTimer);

    // Track modifiers
    if (e.key === 'Control') { appHeldModifiers.ctrl = true; updateAppPeakCombo(); updateLiveModifiers(); return; }
    if (e.key === 'Shift') { appHeldModifiers.shift = true; updateAppPeakCombo(); updateLiveModifiers(); return; }
    if (e.key === 'Alt') { appHeldModifiers.alt = true; updateAppPeakCombo(); updateLiveModifiers(); return; }
    if (e.key === 'Meta') return;

    // Non-modifier key pressed — finalize the combo, clear peak tracking
    appHadNonModifier = true;
    appPeakModifierCombo = '';
    const parts = [];
    if (appHeldModifiers.ctrl || e.ctrlKey) parts.push('Ctrl');
    if (appHeldModifiers.shift || e.shiftKey) parts.push('Shift');
    if (appHeldModifiers.alt || e.altKey) parts.push('Alt');
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    parts.push(key);
    keybindCallback(parts.join('+'), true);
    return;
  }
});

document.addEventListener('keyup', (e) => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (keybindListening && keybindCallback) {
    e.preventDefault();
    if (['Control','Shift','Alt'].includes(e.key)) {
      if (e.key === 'Control') appHeldModifiers.ctrl = false;
      if (e.key === 'Shift') appHeldModifiers.shift = false;
      if (e.key === 'Alt') appHeldModifiers.alt = false;

      // Only finalize as modifier-only if no non-modifier keys were pressed
      if (!appHadNonModifier && appPeakModifierCombo) {
        clearTimeout(modifierOnlyTimer);
        modifierOnlyTimer = setTimeout(() => {
          // Only fire once ALL modifiers are released
          if (!appHeldModifiers.ctrl && !appHeldModifiers.shift && !appHeldModifiers.alt && appPeakModifierCombo) {
            if (keybindListening && keybindCallback) {
              const combo = appPeakModifierCombo;
              appPeakModifierCombo = '';
              keybindCallback(combo, true);
            }
          }
        }, 100);
      }

      // Reset when all modifiers released
      if (!appHeldModifiers.ctrl && !appHeldModifiers.shift && !appHeldModifiers.alt) {
        appHadNonModifier = false;
      }
    }
  }
});

function updateAppPeakCombo() {
  const current = buildAppModifierCombo();
  if (current) appPeakModifierCombo = current;
}

function buildAppModifierCombo() {
  const parts = [];
  if (appHeldModifiers.ctrl) parts.push('Ctrl');
  if (appHeldModifiers.shift) parts.push('Shift');
  if (appHeldModifiers.alt) parts.push('Alt');
  return parts.join('+') || '';
}

function updateLiveModifiers() {
  const combo = buildAppModifierCombo();
  if (combo && keybindLiveCallback) keybindLiveCallback(combo);
}

// ═══════════════════════════════════════════════════════════════════════
// SIDEBAR RESIZE
// ═══════════════════════════════════════════════════════════════════════
function setupSidebarResize() {
  const handle = document.getElementById('sidebarResize');
  const appEl = document.getElementById('app');
  let isResizing = false;

  // Restore saved width
  appEl.style.setProperty('--sidebar-width', config.sidebarWidth + 'px');

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isResizing = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const newWidth = Math.max(120, Math.min(e.clientX, window.innerWidth - 300));
    appEl.style.setProperty('--sidebar-width', newWidth + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      // Save the current width
      const computed = getComputedStyle(appEl).getPropertyValue('--sidebar-width');
      config.sidebarWidth = parseInt(computed) || 204;
      saveConfig();
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════
// AUTO-SCROLL DURING DRAG (categories + pucks + favorites)
// ═══════════════════════════════════════════════════════════════════════
let dragScrollTimer = null;
let dragScrollTarget = null;
let dragScrollDir = 0;

document.addEventListener('dragover', (e) => {
  const main = document.getElementById('main');
  const sidebar = document.getElementById('sidebarButtons');
  const scrollMargin = 50;
  const scrollSpeed = 8;

  let newTarget = null;
  let newDir = 0;

  // Check main area
  if (main) {
    const rect = main.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right) {
      if (e.clientY > rect.bottom - scrollMargin && e.clientY < rect.bottom) {
        newTarget = main; newDir = 1;
      } else if (e.clientY < rect.top + scrollMargin && e.clientY > rect.top) {
        newTarget = main; newDir = -1;
      }
    }
  }

  // Check sidebar
  if (!newTarget && sidebar) {
    const rect = sidebar.getBoundingClientRect();
    if (e.clientX > rect.left && e.clientX < rect.right) {
      if (e.clientY > rect.bottom - scrollMargin && e.clientY < rect.bottom) {
        newTarget = sidebar; newDir = 1;
      } else if (e.clientY < rect.top + scrollMargin && e.clientY > rect.top) {
        newTarget = sidebar; newDir = -1;
      }
    }
  }

  // If target or direction changed, restart the timer
  if (newTarget !== dragScrollTarget || newDir !== dragScrollDir) {
    clearInterval(dragScrollTimer);
    dragScrollTimer = null;
    dragScrollTarget = newTarget;
    dragScrollDir = newDir;
    if (newTarget && newDir) {
      dragScrollTimer = setInterval(() => {
        if (dragScrollTarget) dragScrollTarget.scrollTop += scrollSpeed * dragScrollDir;
      }, 16);
    }
  }
});

function stopDragScroll() {
  clearInterval(dragScrollTimer);
  dragScrollTimer = null;
  dragScrollTarget = null;
  dragScrollDir = 0;
}
document.addEventListener('dragend', stopDragScroll);
document.addEventListener('drop', stopDragScroll);

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
async function init() {
  await loadConfigFromDisk();
  await refreshDevices();
  renderAll();

  const outSel = document.getElementById('outputSelect');
  if (config.outputDeviceId) {
    outSel.value = config.outputDeviceId;
  } else {
    // Auto-select the user's current default output device
    try {
      const defaultDevice = await navigator.mediaDevices.enumerateDevices()
        .then(devices => devices.find(d => d.kind === 'audiooutput' && d.deviceId === 'default'));
      if (defaultDevice) {
        // Find the real device matching 'default' — browsers often alias it
        const realDefault = [...outSel.options].find(o => o.value && o.value !== 'default' && o.textContent.includes('Default')) ||
                            [...outSel.options].find(o => o.value && o.value !== '');
        if (realDefault) {
          outSel.value = realDefault.value;
          config.outputDeviceId = realDefault.value;
          saveConfig();
        }
      } else if (outSel.options.length > 1) {
        // Just pick the first non-empty option
        outSel.value = outSel.options[1].value;
        config.outputDeviceId = outSel.options[1].value;
        saveConfig();
      }
    } catch(e) { /* ignore */ }
  }
  outputDeviceId = outSel.value || null;

  const inSel = document.getElementById('inputSelect');
  if (config.inputDeviceId) inSel.value = config.inputDeviceId;
  inputDeviceId = inSel.value || null;

  // Restore recToInput state (default ON for first startup)
  recToInput = config.recToInput ?? true;
  updateRecToggle();

  // Try to connect to Voicemeeter Remote API on startup and set strip device
  if (hasElectron) {
    try {
      const vmResult = await window.api.vmConnect();
      if (vmResult.success && inSel.value) {
        const selectedOption = inSel.options[inSel.selectedIndex];
        if (selectedOption && selectedOption.textContent) {
          await window.api.vmSetStripDevice({ stripIndex: 0, deviceName: selectedOption.textContent });
        }
      }
    } catch(e) { /* VM not available, that's fine */ }
  }

  document.getElementById('recToggle').addEventListener('click', () => {
    if (!virtualCableDeviceId) {
      alert('No VoiceMeeter or CABLE virtual device detected. Make sure VoiceMeeter is running.');
      return;
    }
    recToInput = !recToInput;
    config.recToInput = recToInput;
    saveConfig();
    updateRecToggle();
  });

  document.getElementById('volumeSlider').addEventListener('input', (e) => {
    config.volume = parseInt(e.target.value);
    // Update gain on all active sounds — recalculate isn't practical per-button here,
    // so we scale relative to master change
    const vol = config.volume / 100;
    activeSounds.forEach(s => {
      if (s.outputGain) s.outputGain.gain.value *= 1; // can't easily recalc per-btn, leave as is
      if (s.outputAudio && !s.outputGain) s.outputAudio.volume = Math.min(vol, 1);
      if (s.inputAudio && !s.inputGain) s.inputAudio.volume = Math.min(vol, 1);
    });
    saveConfig();
  });

  document.getElementById('stopBtn').addEventListener('click', stopAll);

  outSel.addEventListener('change', () => {
    config.outputDeviceId = outSel.value || null;
    outputDeviceId = outSel.value || null;
    saveConfig();
  });

  inSel.addEventListener('change', async () => {
    config.inputDeviceId = inSel.value || null;
    inputDeviceId = inSel.value || null;
    saveConfig();
    // Set Voicemeeter Strip[0] hardware input to the selected mic
    if (hasElectron && inSel.value) {
      const selectedOption = inSel.options[inSel.selectedIndex];
      const deviceLabel = selectedOption ? selectedOption.textContent : '';
      if (deviceLabel) {
        try {
          await window.api.vmConnect();
          await window.api.vmSetStripDevice({ stripIndex: 0, deviceName: deviceLabel });
        } catch(e) { console.log('VM strip set skipped:', e.message); }
      }
    }
  });

  document.getElementById('addSoundBtn').addEventListener('click', () => openEditButtonModal());
  document.getElementById('addCatBtn').addEventListener('click', () => openEditCategoryModal());
  document.getElementById('bulkImportBtn').addEventListener('click', () => openBulkImportModal());

  document.getElementById('browseSoundBtn').addEventListener('click', async () => {
    const files = await pickFiles();
    if (!files || files.length === 0) return;
    const catId = config.categories[0]?.id || '';
    files.forEach(f => {
      const isPath = typeof f === 'string';
      config.buttons.push({
        id: uid(),
        name: isPath ? f.split(/[/\\]/).pop().replace(/\.[^.]+$/, '') : f.name.replace(/\.[^.]+$/, ''),
        source: isPath ? f : f.url,
        color: 'gray', category: catId, keybind: '', favorite: false,
        volume: 100, gainDb: 0, loopInterval: null
      });
    });
    saveConfig(); renderAll();
  });

  // VoiceMeeter buttons
  document.getElementById('vmPathBtn').addEventListener('click', async () => {
    if (hasElectron) {
      const path = await window.api.pickVoicemeeterPath();
      if (path) {
        config.voicemeeterPath = path;
        saveConfig();
      }
    }
  });
  document.getElementById('vmLaunchBtn').addEventListener('click', () => {
    if (hasElectron) {
      if (!config.voicemeeterPath) {
        alert('Set VoiceMeeter path first (VM Path button)');
        return;
      }
      window.api.launchVoicemeeter(config.voicemeeterPath);
    }
  });

  if (hasElectron) {
    document.getElementById('winClose').addEventListener('click', () => window.api.winClose());
    document.getElementById('winMin').addEventListener('click', () => window.api.winMinimize());
    document.getElementById('winMax').addEventListener('click', () => window.api.winMaximize());
  }

  setupSidebarResize();

  // Bulk select toolbar
  document.getElementById('bulkPaste').addEventListener('click', bulkPasteLoop);
  document.getElementById('bulkStartLoop').addEventListener('click', bulkStartLoop);
  document.getElementById('bulkStopLoop').addEventListener('click', bulkStopLoop);
  document.getElementById('bulkDelete').addEventListener('click', bulkDeleteSelected);
  document.getElementById('bulkCancel').addEventListener('click', exitBulkSelectMode);

  // Escape to exit bulk mode
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && bulkSelectMode) {
      exitBulkSelectMode();
    }
  });

  // Setup guide button
  const guideBtn = document.getElementById('guideBtn');
  if (!config.guideSeen) guideBtn.classList.add('blink');
  guideBtn.addEventListener('click', () => {
    guideBtn.classList.remove('blink');
    if (!config.guideSeen) {
      config.guideSeen = true;
      saveConfig();
    }
    openGuideModal();
  });
}

init();
</script>
