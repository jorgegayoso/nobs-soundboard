<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nob's Soundboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:    #0a0a0f;
  --bg-surface: #12121a;
  --bg-card:    #1a1a25;
  --bg-raised:  #22222f;
  --bg-hover:   #2a2a38;
  --accent:     #00e676;
  --accent-dim: #00a854;
  --accent-glow: rgba(0, 230, 118, 0.15);
  --danger:     #ff1744;
  --danger-dim: #d50000;
  --text-1:     #e8e8f0;
  --text-2:     #8888a0;
  --text-3:     #55556a;
  --border:     #2a2a38;
  --border-light:#3a3a4a;
  --radius:     10px;
  --radius-lg:  16px;
  --font-mono:  'JetBrains Mono', 'Consolas', monospace;
  --font-body:  'Outfit', sans-serif;
  --shadow-drop: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-glow);
}

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 14px;
  overflow: hidden;
  user-select: none;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ═══ LAYOUT ═══ */
#app {
  display: grid;
  grid-template-rows: 42px 1fr 46px;
  grid-template-columns: var(--sidebar-width, 204px) 1fr;
  grid-template-areas: "topbar topbar" "sidebar main" "bottom bottom";
  height: 100vh;
}

/* ═══ TOPBAR ═══ */
#topbar {
  grid-area: topbar;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 10px;
  -webkit-app-region: drag;
  z-index: 10;
}
#topbar > * { -webkit-app-region: no-drag; }

.win-btns { display: flex; gap: 0; margin-right: 8px; }
.win-btn {
  width: 36px; height: 28px;
  border: none; background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.12s;
}
.win-btn svg { width: 14px; height: 14px; stroke: var(--text-2); stroke-width: 1.5; fill: none; }
.win-btn:hover { background: var(--bg-hover); }
.win-btn:hover svg { stroke: var(--text-1); }
.win-btn.close:hover { background: var(--danger); }
.win-btn.close:hover svg { stroke: #fff; }

.logo {
  font-family: var(--font-mono); font-weight: 800; font-size: 13px;
  color: var(--accent); letter-spacing: 1.5px; white-space: nowrap;
}
.topbar-spacer { flex: 1; }

.device-group { display: flex; align-items: center; gap: 5px; }
.device-group label {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.device-select {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text-1);
  font-family: var(--font-mono); font-size: 10px;
  padding: 3px 6px; max-width: 240px; outline: none; cursor: pointer;
}
.device-select:focus { border-color: var(--accent); }
.device-select option { background: var(--bg-card); color: var(--text-1); }

.vol-group { display: flex; align-items: center; gap: 5px; }
.vol-group label { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.vol-slider {
  -webkit-appearance: none; width: 80px; height: 3px;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 6px var(--accent-glow);
}

.stop-btn {
  background: var(--danger); border: none; color: #fff;
  font-family: var(--font-mono); font-weight: 700; font-size: 10px;
  padding: 5px 12px; border-radius: 5px; cursor: pointer;
  transition: background 0.15s;
}
.stop-btn:hover { background: var(--danger-dim); }

.rec-toggle {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-3);
  font-family: var(--font-mono); font-weight: 700; font-size: 10px;
  padding: 5px 10px; border-radius: 5px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.rec-toggle:hover { background: var(--bg-hover); color: var(--text-1); }
.rec-toggle.active {
  background: var(--accent); color: #000; border-color: var(--accent);
}
.rec-toggle.active:hover { background: var(--accent-dim); }

/* ═══ SIDEBAR ═══ */
#sidebar {
  grid-area: sidebar; background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  position: relative; min-width: 120px;
}
.sidebar-title {
  font-family: var(--font-mono); font-weight: 700; font-size: 11px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 1px;
  padding: 12px 12px 6px;
}
.sidebar-buttons {
  flex: 1; overflow-y: auto; padding: 4px 8px;
  display: flex; flex-wrap: wrap; align-content: flex-start; gap: 6px;
  min-height: 60px;
}
.sidebar-empty {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  padding: 10px 4px; line-height: 1.5;
}
#sidebarResize {
  position: absolute; top: 0; right: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 5;
}
#sidebarResize:hover, #sidebarResize.active { background: var(--accent); opacity: 0.3; }

/* ═══ MAIN ═══ */
#main {
  grid-area: main; overflow-y: auto; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 14px;
  min-height: 0;
}

/* ═══ BOTTOM BAR ═══ */
#bottombar {
  grid-area: bottom; background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 8px;
}
.bb-spacer { flex: 1; }
.bb-btn {
  border: none; font-family: var(--font-mono); font-weight: 600; font-size: 11px;
  padding: 6px 14px; border-radius: 18px; cursor: pointer; transition: all 0.15s;
}
.bb-btn.primary { background: var(--accent); color: #000; }
.bb-btn.primary:hover { background: var(--accent-dim); }
.bb-btn.secondary { background: var(--bg-card); color: var(--text-1); border: 1px solid var(--border); }
.bb-btn.secondary:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--accent); }
.bb-btn.vm { background: var(--bg-card); color: var(--text-2); border: 1px solid var(--border); font-size: 10px; padding: 5px 10px; }
.bb-btn.vm:hover { background: var(--bg-hover); border-color: #ff9800; color: #ff9800; }
.bb-btn.guide { background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent-dim); font-size: 10px; padding: 5px 12px; }
.bb-btn.guide:hover { background: var(--accent-glow); border-color: var(--accent); }
.bb-btn.guide.blink {
  animation: guide-blink 1.5s ease-in-out infinite;
}
@keyframes guide-blink {
  0%, 100% { opacity: 1; box-shadow: none; }
  50% { opacity: 0.7; box-shadow: 0 0 12px var(--accent-glow); }
}

/* Guide modal */
.guide-content { font-family: var(--font-body); font-size: 13px; color: var(--text-1); line-height: 1.7; }
.guide-content h3 {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  color: var(--accent); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.guide-content h3:first-child { margin-top: 0; }
.guide-content p { margin: 4px 0; }
.guide-content .step {
  display: flex; gap: 8px; margin: 6px 0; padding: 8px 10px;
  background: var(--bg-card); border-radius: 8px; border-left: 3px solid var(--accent);
}
.guide-content .step-num {
  font-family: var(--font-mono); font-weight: 700; font-size: 13px;
  color: var(--accent); min-width: 20px;
}
.guide-content .step-text { flex: 1; }
.guide-content .note {
  margin: 8px 0; padding: 8px 10px;
  background: rgba(255, 152, 0, 0.1); border-radius: 8px;
  border-left: 3px solid #ff9800; font-size: 12px; color: #ffb74d;
}
.guide-content .tip {
  margin: 8px 0; padding: 8px 10px;
  background: rgba(0, 230, 118, 0.06); border-radius: 8px;
  border-left: 3px solid var(--accent-dim); font-size: 12px; color: var(--accent);
}

/* ═══ SOUND PUCK ═══ */
.sound-puck {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 6px 7px; border-radius: var(--radius);
  background: var(--bg-card); cursor: pointer; transition: all 0.15s;
  width: 84px; position: relative;
}
.sound-puck:hover { background: var(--bg-raised); transform: translateY(-1px); }
.sound-puck:active { transform: translateY(1px); }

/* Drag and drop */
.sound-puck[draggable="true"] { cursor: grab; }
.sound-puck.dragging { opacity: 0.3; }
.sound-puck.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; }
.category-grid.drag-over-empty { outline: 2px dashed var(--accent); outline-offset: -2px; border-radius: var(--radius); }

/* Loop indicator */
.sound-puck .loop-icon {
  position: absolute; top: 3px; left: 5px;
  font-size: 9px; color: var(--cat-color, var(--accent));
  filter: drop-shadow(0 0 2px var(--cat-color, var(--accent-glow)));
  display: none;
}
.sound-puck.looping .loop-icon { display: block; }
.sound-puck.looping {
  outline: 2px solid var(--cat-color, var(--accent));
  outline-offset: -1px;
  border-radius: var(--radius);
}

.sound-puck.downloading { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }
.sound-puck.downloading .puck-label { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.sound-puck .fav-star {
  position: absolute; top: 3px; right: 5px;
  font-size: 10px; color: #ffd600;
  filter: drop-shadow(0 0 2px rgba(255,214,0,0.5));
  display: none;
}
.sound-puck.favorited .fav-star { display: block; }

.puck-circle {
  width: 46px; height: 30px; border-radius: 15px;
  position: relative; overflow: hidden;
  box-shadow: 0 3px 0 rgba(0,0,0,0.4); transition: box-shadow 0.1s;
}
.sound-puck:active .puck-circle { box-shadow: 0 1px 0 rgba(0,0,0,0.4); }

.puck-label {
  font-family: var(--font-mono); font-size: 9px; color: var(--text-2);
  text-align: center; max-width: 78px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}

.sound-puck.playing .puck-circle {
  box-shadow: 0 0 12px currentColor;
  animation: pulse-glow 0.6s ease-in-out infinite alternate;
}
.sound-puck.playing {
  outline: 2px solid var(--cat-color, var(--accent));
  outline-offset: -1px;
  border-radius: var(--radius);
}
@keyframes pulse-glow { from { box-shadow: 0 0 8px currentColor; } to { box-shadow: 0 0 18px currentColor; } }

/* ═══ CATEGORY ═══ */
.category-frame {
  border: 2px solid var(--cat-color, var(--border));
  border-radius: var(--radius-lg); background: var(--bg-surface);
  overflow: hidden; transition: border-color 0.2s;
  flex-shrink: 0;
}
.category-frame.dragging { opacity: 0.3; }
.category-frame.cat-drag-over { border-color: var(--accent); border-style: dashed; }
.category-header {
  display: flex; align-items: center; padding: 9px 14px; gap: 8px; cursor: grab;
}
.category-header:active { cursor: grabbing; }
.category-fold {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-3); font-size: 10px; transition: transform 0.2s;
  flex-shrink: 0; border: none; background: none; padding: 0;
}
.category-fold:hover { color: var(--text-1); }
.category-fold.collapsed { transform: rotate(-90deg); }
.category-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--cat-color); box-shadow: 0 0 6px var(--cat-color); flex-shrink: 0;
}
.category-name {
  font-family: var(--font-mono); font-weight: 700; font-size: 12px;
  color: var(--cat-color); letter-spacing: 0.5px;
}
.category-count {
  font-family: var(--font-mono); font-size: 9px; color: var(--text-3); margin-left: auto;
}
.category-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 4px 12px 12px; min-height: 56px;
}
.category-grid.collapsed {
  display: none;
}
.category-empty {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  padding: 10px 0; width: 100%; text-align: center;
}

/* ═══ CONTEXT MENU ═══ */
.ctx-menu {
  position: fixed; z-index: 999; background: var(--bg-raised);
  border: 1px solid var(--border-light); border-radius: 8px;
  padding: 4px 0; min-width: 170px; box-shadow: var(--shadow-drop); display: none;
}
.ctx-menu.show { display: block; }
.ctx-item {
  display: block; width: 100%; padding: 6px 14px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-1); background: none; border: none;
  text-align: left; cursor: pointer;
}
.ctx-item:hover { background: var(--bg-hover); color: var(--accent); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: var(--bg-hover); color: var(--danger); }
.ctx-item.favorite { color: #ffd600; }
.ctx-item.favorite:hover { background: var(--bg-hover); color: #ffd600; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ═══ MODAL ═══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px; width: 460px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-drop), var(--shadow-glow);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

.modal h2 {
  font-family: var(--font-mono); font-weight: 700; font-size: 15px;
  color: var(--accent); margin-bottom: 14px;
}
.modal-field { margin-bottom: 12px; }
.modal-field label {
  display: block; font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
}
.modal-field input[type="text"],
.modal-field select {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-1);
  font-family: var(--font-mono); font-size: 12px;
  padding: 7px 10px; outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }

.modal-field .input-row { display: flex; gap: 6px; }
.modal-field .input-row input { flex: 1; }
.modal-field .input-row button {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: 6px; color: var(--accent);
  font-family: var(--font-mono); font-size: 11px;
  padding: 7px 12px; cursor: pointer; white-space: nowrap;
}
.modal-field .input-row button:hover { background: var(--bg-hover); }

/* volume + gain row */
.vol-gain-row { display: flex; gap: 12px; align-items: flex-end; }
.vol-gain-row .modal-field { flex: 1; margin-bottom: 0; }
.mini-slider {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
.mini-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}
.gain-row { display: flex; align-items: center; gap: 4px; }
.gain-btn {
  width: 24px; height: 24px; border-radius: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--accent); font-family: var(--font-mono); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s; line-height: 1;
}
.gain-btn:hover { background: var(--bg-hover); }
.gain-val {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-1);
  min-width: 52px; text-align: center;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 4px; outline: none; width: 64px;
}
.gain-val:focus { border-color: var(--accent); }

.color-options { display: flex; gap: 6px; flex-wrap: wrap; }
.color-opt {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer; transition: all 0.15s; position: relative;
}
.color-opt:hover { transform: scale(1.15); }
.color-opt.selected { border-color: #fff; box-shadow: 0 0 8px currentColor; }
.color-opt.selected::after {
  content: '\2713'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: bold;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

/* keybind recorder */
.keybind-box {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-2);
  font-family: var(--font-mono); font-size: 12px;
  padding: 7px 10px; cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.keybind-box:hover { border-color: var(--text-3); }
.keybind-box.listening {
  border-color: var(--accent); color: var(--accent);
  animation: border-pulse 1s ease-in-out infinite alternate;
}
@keyframes border-pulse {
  from { box-shadow: 0 0 0 rgba(0,230,118,0); }
  to   { box-shadow: 0 0 8px rgba(0,230,118,0.3); }
}
.keybind-clear {
  font-size: 9px; color: var(--text-3); margin-top: 3px;
  cursor: pointer; font-family: var(--font-mono);
}
.keybind-clear:hover { color: var(--danger); }

.modal-actions {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
}
.modal-actions button {
  font-family: var(--font-mono); font-weight: 600; font-size: 12px;
  padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s;
}
.modal-actions .save-btn { background: var(--accent); color: #000; }
.modal-actions .save-btn:hover { background: var(--accent-dim); }
.modal-actions .cancel-btn { background: var(--bg-card); color: var(--text-2); border: 1px solid var(--border); }
.modal-actions .cancel-btn:hover { background: var(--bg-hover); color: var(--text-1); }

/* ═══ BULK SELECT / SHAKE MODE ═══ */
@keyframes shake {
  0%  { transform: rotate(0deg); }
  20% { transform: rotate(-0.8deg); }
  40% { transform: rotate(0.8deg); }
  60% { transform: rotate(-0.5deg); }
  80% { transform: rotate(0.5deg); }
  100%{ transform: rotate(0deg); }
}
.shake-mode .sound-puck {
  cursor: pointer !important;
  animation: shake 0.35s ease-in-out infinite;
  animation-delay: calc(var(--shake-delay, 0) * 1ms);
  touch-action: none;
}
.shake-mode .sound-puck:hover { transform: none; }
.shake-mode .sound-puck:active { transform: none; }
.shake-mode .sound-puck.bulk-selected {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  box-shadow: 0 0 10px var(--accent-glow);
  animation: none;
  transform: scale(0.95);
}

#bulkToolbar {
  display: none;
  position: fixed; top: 48px; right: 12px; z-index: 50;
  flex-direction: column;
  background: var(--bg-surface); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 6px;
  box-shadow: var(--shadow-drop), 0 0 16px rgba(0,0,0,0.4);
  gap: 5px;
  min-width: 130px;
}
#bulkToolbar.show { display: flex; }
.bulk-btn {
  border: none; font-family: var(--font-mono); font-weight: 600; font-size: 11px;
  padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: all 0.12s;
  white-space: nowrap; text-align: center; width: 100%;
}
.bulk-btn.paste { background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent-dim); }
.bulk-btn.paste:hover { background: var(--accent-glow); }
.bulk-btn.paste:disabled { opacity: 0.3; cursor: not-allowed; }
.bulk-btn.delete { background: var(--bg-card); color: var(--danger); border: 1px solid var(--danger-dim); }
.bulk-btn.delete:hover { background: rgba(255,23,68,0.1); }
.bulk-btn.cancel-bulk { background: var(--bg-card); color: var(--text-2); border: 1px solid var(--border); }
.bulk-btn.cancel-bulk:hover { background: var(--bg-hover); color: var(--text-1); }
.bulk-btn.loop-start { background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent-dim); }
.bulk-btn.loop-start:hover { background: var(--accent-glow); }
.bulk-btn.loop-start:disabled { opacity: 0.3; cursor: not-allowed; }

</head>

<script>
// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let config = {
  volume: 80,
  outputDeviceId: null,
  buttons: [],       // each: { id, name, source, color, category, keybind, favorite, volume, gainDb, resolvedPath }
  categories: [{ id: 'cat_1', name: 'Category 1', color: '#00c853' }],
  customColors: [],  // array of hex strings e.g. ['#ff6600', '#123abc']
  favoriteOrder: [], // array of button ids for custom ordering in favorites
  sidebarWidth: 204, // saved sidebar width in px
  guideSeen: false    // whether the setup guide has been viewed
};

const downloadingSet = new Set();
const collapsedCats = new Set(); // track which categories are folded

const PUCK_COLORS = {
  gray:   { main: '#555', hi: '#777', lo: '#3a3a3a' },
  blue:   { main: '#1565c0', hi: '#42a5f5', lo: '#0d47a1' },
  red:    { main: '#c62828', hi: '#ef5350', lo: '#b71c1c' },
  green:  { main: '#2e7d32', hi: '#66bb6a', lo: '#1b5e20' },
  orange: { main: '#e65100', hi: '#ff9800', lo: '#bf360c' },
  purple: { main: '#6a1b9a', hi: '#ab47bc', lo: '#4a148c' },
  cyan:   { main: '#00838f', hi: '#26c6da', lo: '#006064' },
  yellow: { main: '#f9a825', hi: '#ffee58', lo: '#f57f17' },
};
const DEFAULT_CAT_COLORS = ['#00c853','#ff6d00','#d50000','#2962ff','#aa00ff','#00bfa5'];

function hexToRgb(hex) {
  if (!hex || !hex.startsWith('#')) return null;
  const h = hex.replace('#', '');
  const bigint = parseInt(h, 16);
  return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
}

let outputDeviceId = null;
let inputDeviceId = null;

// ═══════════════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════════════
// Convert dB to linear gain multiplier
function dbToLinear(db) { return Math.pow(10, db / 20); }

// Track all active audio instances
let activeSounds = [];
// Track active loops: btnId → { timerId, active }
let activeLoops = {};

// Copied loop settings for paste
let copiedLoopSettings = null;

// Bulk selection mode
let bulkSelectMode = false;
let bulkSelectedIds = new Set();
let lastSelectedId = null;
let longPressTimer = null;

// Drag-to-select state
let bulkDragging = false;
let bulkDragAnchorId = null;
let bulkDragPrevRange = new Set(); // ids added by the current drag, so we can undo on backtrack
let bulkSuppressClick = false; // suppress click after drag or long-press entry

// We need separate AudioContexts per output device since setSinkId is per-context
const audioContextCache = {}; // deviceId → AudioContext

function getAudioContext(deviceId) {
  if (audioContextCache[deviceId]) return audioContextCache[deviceId];
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.setSinkId && deviceId) {
    ctx.setSinkId(deviceId).catch(e => console.warn('setSinkId on ctx:', e));
  }
  audioContextCache[deviceId] = ctx;
  return ctx;
}

function stopAll() {
  activeSounds.forEach(s => {
    if (s.outputAudio) { s.outputAudio.pause(); s.outputAudio.currentTime = 0; }
    if (s.inputAudio) { s.inputAudio.pause(); s.inputAudio.currentTime = 0; }
    if (s.puckEl) s.puckEl.classList.remove('playing');
  });
  activeSounds = [];
  // Stop all loops
  Object.keys(activeLoops).forEach(id => {
    clearTimeout(activeLoops[id].timerId);
    clearInterval(activeLoops[id].timerId);
  });
  activeLoops = {};
  document.querySelectorAll('.sound-puck.looping').forEach(el => el.classList.remove('looping'));
}

function stopButton(btnId) {
  const toStop = activeSounds.filter(s => s.btnId === btnId);
  toStop.forEach(s => {
    if (s.outputAudio) { s.outputAudio.pause(); s.outputAudio.currentTime = 0; }
    if (s.inputAudio) { s.inputAudio.pause(); s.inputAudio.currentTime = 0; }
    if (s.puckEl) { s.puckEl.classList.remove('playing'); s.puckEl.classList.remove('looping'); }
  });
  activeSounds = activeSounds.filter(s => s.btnId !== btnId);
  // Stop loop for this button
  if (activeLoops[btnId]) {
    clearTimeout(activeLoops[btnId].timerId);
    clearInterval(activeLoops[btnId].timerId);
    delete activeLoops[btnId];
  }
}

function toggleLoop(btn, puckEl) {
  if (activeLoops[btn.id]) {
    // Stop looping
    stopButton(btn.id);
    return;
  }
  // Start looping
  startLoop(btn, puckEl);
}

function startLoop(btn, puckEl) {
  const interval = btn.loopInterval;
  if (interval === null) return;

  if (puckEl) puckEl.classList.add('looping');

  if (interval === -1) {
    // Repeat on end: play once, then replay when it finishes
    activeLoops[btn.id] = { timerId: null, active: true };
    playSoundWithLoopOnEnd(btn, puckEl);
  } else if (interval === -2) {
    // Random interval: play every random(min, max) seconds
    const min = btn.loopRandomMin || 1;
    const max = btn.loopRandomMax || 5;
    activeLoops[btn.id] = { timerId: null, active: true };
    playSound(btn, puckEl);
    scheduleRandomLoop(btn, puckEl, min, max);
  } else if (interval > 0) {
    // Play every N seconds
    playSound(btn, puckEl);
    const tid = setInterval(() => {
      if (!activeLoops[btn.id]) return;
      playSound(btn, puckEl);
    }, interval * 1000);
    activeLoops[btn.id] = { timerId: tid, active: true };
  }
}

function scheduleRandomLoop(btn, puckEl, min, max) {
  if (!activeLoops[btn.id]) return;
  const delay = (Math.random() * (max - min) + min) * 1000;
  const tid = setTimeout(() => {
    if (!activeLoops[btn.id]) return;
    playSound(btn, puckEl);
    scheduleRandomLoop(btn, puckEl, min, max);
  }, delay);
  activeLoops[btn.id].timerId = tid;
}

async function playSoundWithLoopOnEnd(btn, puckEl) {
  if (!activeLoops[btn.id]) return;

  let src = btn.resolvedPath || btn.source;
  if (!src) return;
  let url = src;
  if (src.match(/^[A-Z]:\\/i) || src.startsWith('/')) {
    url = 'file:///' + src.replace(/\\/g, '/');
  }

  const master = config.volume / 100;
  const btnVol = (btn.volume ?? 100) / 100;
  const gainMult = dbToLinear(btn.gainDb || 0);
  const finalVol = Math.max(master * btnVol * gainMult, 0);
  const hasOutput = !!outputDeviceId;
  const hasInput = recToInput && !!virtualCableDeviceId;
  if (!hasOutput && !hasInput) return;

  const entry = { btnId: btn.id, outputAudio: null, inputAudio: null, puckEl: puckEl || null };

  const onEnded = () => {
    removeFinishedSound(entry);
    // Replay if loop is still active
    if (activeLoops[btn.id]) {
      playSoundWithLoopOnEnd(btn, puckEl);
    }
  };

  try {
    if (hasOutput) {
      const { audio, gainNode } = createAmplifiedAudio(url, outputDeviceId, finalVol);
      entry.outputAudio = audio;
      entry.outputGain = gainNode;
      audio.play();
      audio.addEventListener('ended', () => { entry.outputAudio = null; if (!entry.inputAudio) onEnded(); });
      audio.addEventListener('error', () => { entry.outputAudio = null; if (!entry.inputAudio) onEnded(); });
    }
    if (hasInput) {
      const { audio: audio2, gainNode: gainNode2 } = createAmplifiedAudio(url, virtualCableDeviceId, finalVol);
      entry.inputAudio = audio2;
      entry.inputGain = gainNode2;
      audio2.play();
      audio2.addEventListener('ended', () => { entry.inputAudio = null; if (!entry.outputAudio) onEnded(); });
      audio2.addEventListener('error', () => { entry.inputAudio = null; if (!entry.outputAudio) onEnded(); });
    }
    activeSounds.push(entry);
    if (puckEl) puckEl.classList.add('playing');
  } catch(e) { console.error('Loop play error:', e); }
}

function isButtonPlaying(btnId) {
  return activeSounds.some(s => s.btnId === btnId);
}

function removeFinishedSound(entry) {
  activeSounds = activeSounds.filter(s => s !== entry);
  if (entry.puckEl && !activeSounds.some(s => s.btnId === entry.btnId)) {
    entry.puckEl.classList.remove('playing');
  }
}

// Create an Audio element routed through a Web Audio GainNode for true amplification
function createAmplifiedAudio(url, deviceId, volume) {
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.src = url;

  // Try to use Web Audio API for gain beyond 1.0
  let gainNode = null;
  let ctx = null;
  try {
    ctx = getAudioContext(deviceId);
    const source = ctx.createMediaElementSource(audio);
    gainNode = ctx.createGain();
    gainNode.gain.value = volume; // can exceed 1.0!
    source.connect(gainNode);
    gainNode.connect(ctx.destination);
  } catch(e) {
    // Fallback: setSinkId on the audio element directly, clamp volume
    console.warn('Web Audio fallback:', e);
    audio.volume = Math.min(volume, 1);
    if (audio.setSinkId && deviceId) {
      audio.setSinkId(deviceId).catch(err => console.warn('setSinkId:', err));
    }
  }

  return { audio, gainNode };
}

async function playSound(btn, puckEl) {
  let src = btn.resolvedPath || btn.source;
  if (!src) return;

  let url = src;
  if (src.match(/^[A-Z]:\\/i) || src.startsWith('/')) {
    url = 'file:///' + src.replace(/\\/g, '/');
  }

  // Compute final volume as a linear multiplier (can exceed 1.0 with positive dB)
  const master = config.volume / 100;
  const btnVol = (btn.volume ?? 100) / 100;
  const gainMult = dbToLinear(btn.gainDb || 0);
  const finalVol = Math.max(master * btnVol * gainMult, 0);

  const hasOutput = !!outputDeviceId;
  const hasInput = recToInput && !!virtualCableDeviceId;
  console.log('[playSound]', { hasOutput, hasInput, recToInput, virtualCable: virtualCableDeviceId ? 'detected' : 'NONE', outputDeviceId: outputDeviceId || 'NONE' });

  if (!hasOutput && !hasInput) return;

  const entry = { btnId: btn.id, outputAudio: null, inputAudio: null, puckEl: puckEl || null };

  try {
    if (hasOutput) {
      const { audio, gainNode } = createAmplifiedAudio(url, outputDeviceId, finalVol);
      entry.outputAudio = audio;
      entry.outputGain = gainNode;
      audio.play();

      audio.addEventListener('ended', () => { entry.outputAudio = null; if (!entry.inputAudio) removeFinishedSound(entry); });
      audio.addEventListener('error', () => { entry.outputAudio = null; if (!entry.inputAudio) removeFinishedSound(entry); });
    }

    if (hasInput) {
      const { audio: audio2, gainNode: gainNode2 } = createAmplifiedAudio(url, virtualCableDeviceId, finalVol);
      entry.inputAudio = audio2;
      entry.inputGain = gainNode2;
      audio2.play();

      audio2.addEventListener('ended', () => { entry.inputAudio = null; if (!entry.outputAudio) removeFinishedSound(entry); });
      audio2.addEventListener('error', () => { entry.inputAudio = null; if (!entry.outputAudio) removeFinishedSound(entry); });
    }

    activeSounds.push(entry);
    if (puckEl) puckEl.classList.add('playing');
  } catch(e) { console.error('Play error:', e); }
}

// ═══════════════════════════════════════════════════════════════════════
// DEVICES — live refresh
// ═══════════════════════════════════════════════════════════════════════
let virtualCableDeviceId = null; // auto-detected VoiceMeeter/CABLE output device for routing sounds
let recToInput = false; // whether sounds should route to the virtual cable

async function refreshDevices() {
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e){}
  const devices = await navigator.mediaDevices.enumerateDevices();
  const outputs = devices.filter(d => d.kind === 'audiooutput');
  const inputs = devices.filter(d => d.kind === 'audioinput');

  // Output selector
  const outSel = document.getElementById('outputSelect');
  const curOutVal = outSel.value;
  outSel.innerHTML = '<option value="">None</option>';
  outputs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Speaker ${d.deviceId.substring(0,8)}`;
    outSel.appendChild(opt);
  });
  if (config.outputDeviceId && [...outSel.options].some(o => o.value === config.outputDeviceId)) {
    outSel.value = config.outputDeviceId;
  } else {
    outSel.value = curOutVal || '';
  }
  outputDeviceId = outSel.value || null;

  // Input selector — shows real audio input (microphone) devices
  const inSel = document.getElementById('inputSelect');
  const curInVal = inSel.value;
  inSel.innerHTML = '<option value="">None</option>';
  inputs.forEach(d => {
    if (d.deviceId === 'default' || d.deviceId === 'communications') return; // skip aliases
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Mic ${d.deviceId.substring(0,8)}`;
    inSel.appendChild(opt);
  });
  if (config.inputDeviceId && [...inSel.options].some(o => o.value === config.inputDeviceId)) {
    inSel.value = config.inputDeviceId;
  } else {
    inSel.value = curInVal || '';
  }
  inputDeviceId = inSel.value || null;

  // Auto-detect VoiceMeeter/CABLE virtual cable output for sound routing
  const vmCable = outputs.find(d => {
    const l = (d.label || '').toLowerCase();
    return l.includes('voicemeeter') || l.includes('vb-audio') || l.includes('cable input');
  });
  virtualCableDeviceId = vmCable ? vmCable.deviceId : null;
  console.log('Audio outputs:', outputs.map(d => d.label));
  console.log('Virtual cable detected:', vmCable ? vmCable.label : 'NONE');

  // Update rec toggle state
  updateRecToggle();
}

function updateRecToggle() {
  const btn = document.getElementById('recToggle');
  if (recToInput && virtualCableDeviceId) {
    btn.classList.add('active');
    btn.textContent = '🔊 Rec';
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔇 Rec';
  }
  if (!virtualCableDeviceId) {
    btn.title = 'No VoiceMeeter/CABLE virtual device detected';
  } else {
    btn.title = recToInput ? 'Sounds are being routed to VoiceMeeter Input' : 'Click to route sounds to VoiceMeeter Input';
  }
}

navigator.mediaDevices?.addEventListener('devicechange', () => refreshDevices());

// ═══════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════
const hasElectron = typeof window.api !== 'undefined';

async function loadConfigFromDisk() {
  if (hasElectron) config = await window.api.loadConfig();
  config.buttons = config.buttons || [];
  config.categories = config.categories || [{ id: 'cat_1', name: 'Category 1', color: '#00c853' }];
  config.customColors = config.customColors || [];
  config.favoriteOrder = config.favoriteOrder || [];
  config.sidebarWidth = config.sidebarWidth ?? 204;
  config.guideSeen = config.guideSeen ?? false;
  config.volume = config.volume ?? 80;
  config.inputDeviceId = config.inputDeviceId || null;
  // Ensure new fields exist on all buttons
  config.buttons.forEach(b => {
    if (b.volume === undefined) b.volume = 100;
    if (b.gainDb === undefined) b.gainDb = 0;
    if (b.loopInterval === undefined) b.loopInterval = null; // null = no loop, -1 = repeat on end, -2 = random interval, >0 = seconds
    if (b.loopRandomMin === undefined) b.loopRandomMin = 1;
    if (b.loopRandomMax === undefined) b.loopRandomMax = 5;
  });
}

async function saveConfig() {
  if (hasElectron) await window.api.saveConfig(config);
}

async function pickFiles() {
  if (hasElectron) return await window.api.pickFiles();
  return new Promise(resolve => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'audio/*'; inp.multiple = true;
    inp.onchange = () => resolve(Array.from(inp.files).map(f => ({ name: f.name, url: URL.createObjectURL(f) })));
    inp.click();
  });
}

// ═══════════════════════════════════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════════════════════════════════
function getCategoryName(catId) {
  const cat = config.categories.find(c => c.id === catId);
  return cat ? cat.name : 'Uncategorized';
}

function isUrl(src) { return src && (src.startsWith('http://') || src.startsWith('https://')); }

async function downloadAndResolve(btn) {
  if (!hasElectron) return btn.source;
  const src = btn.source || '';
  if (!isUrl(src)) return src;
  if (btn.resolvedPath) return btn.resolvedPath;

  const catName = getCategoryName(btn.category);
  const safeName = btn.name.replace(/[^a-zA-Z0-9 _-]/g, '_').substring(0, 60);

  downloadingSet.add(btn.id);
  renderAll();

  try {
    const result = await window.api.downloadUrl({ url: src, categoryName: catName, fileName: safeName });
    if (result.success) {
      btn.resolvedPath = result.filePath;
      await saveConfig();
      return result.filePath;
    } else {
      alert('Download failed:\n\n' + (result.error || 'Unknown error'));
      return null;
    }
  } catch(e) {
    alert('Download error: ' + e.message);
    return null;
  } finally {
    downloadingSet.delete(btn.id);
    renderAll();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function uid() { return 'id_' + Math.random().toString(36).substring(2, 10); }

function getColorsForButton(colorVal) {
  if (PUCK_COLORS[colorVal]) return PUCK_COLORS[colorVal];
  // Custom hex color — generate hi/lo variants
  if (colorVal && colorVal.startsWith('#')) {
    const hex = colorVal.replace('#', '');
    const r = parseInt(hex.substring(0, 2), 16);
    const g = parseInt(hex.substring(2, 4), 16);
    const b = parseInt(hex.substring(4, 6), 16);
    return {
      main: colorVal,
      hi: `rgb(${Math.min(r + 60, 255)}, ${Math.min(g + 60, 255)}, ${Math.min(b + 60, 255)})`,
      lo: `rgb(${Math.max(r - 40, 0)}, ${Math.max(g - 40, 0)}, ${Math.max(b - 40, 0)})`
    };
  }
  return PUCK_COLORS.gray;
}

function renderPuck(btn, container, isDragEnabled = true) {
  const colors = getColorsForButton(btn.color);
  const cat = config.categories.find(c => c.id === btn.category);
  const catColor = cat ? cat.color : '#888';
  const el = document.createElement('div');
  el.className = 'sound-puck';
  el.dataset.btnId = btn.id;
  el.style.setProperty('--cat-color', catColor);
  // Random shake delay so they don't all shake in unison
  el.style.setProperty('--shake-delay', Math.floor(Math.random() * 250));
  // Subtle category tint on puck background (main area only)
  if (isDragEnabled) {
    const rgb = hexToRgb(catColor);
    if (rgb) el.style.background = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.05)`;
  }
  if (btn.favorite) el.classList.add('favorited');
  if (downloadingSet.has(btn.id)) el.classList.add('downloading');
  if (isButtonPlaying(btn.id)) el.classList.add('playing');
  if (activeLoops[btn.id]) el.classList.add('looping');
  if (bulkSelectMode && bulkSelectedIds.has(btn.id)) el.classList.add('bulk-selected');

  if (isDragEnabled && !bulkSelectMode) el.draggable = true;

  el.innerHTML = `
    <span class="loop-icon">\u21BB</span>
    <span class="fav-star">\u2605</span>
    <div class="puck-circle" style="background:${colors.main}; color:${colors.main}; border-bottom: 3px solid ${colors.lo};"></div>
    <div class="puck-label" title="${btn.name}">${btn.name}</div>
  `;

  activeSounds.forEach(s => { if (s.btnId === btn.id) s.puckEl = el; });

  // Drag & drop (disabled in bulk select mode)
  if (isDragEnabled && !bulkSelectMode) {
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', btn.id);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
      dragSrcBtnId = btn.id;
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      dragSrcBtnId = null;
      document.querySelectorAll('.drag-over, .drag-over-empty').forEach(x => x.classList.remove('drag-over', 'drag-over-empty'));
    });
    el.addEventListener('dragover', (e) => {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault(); el.classList.remove('drag-over');
      const srcId = e.dataTransfer.getData('text/plain');
      if (srcId && srcId !== btn.id) {
        reorderButton(srcId, btn.id, btn.category);
      }
    });
  }

  // Long press to enter bulk mode + drag-to-select (only on main grid pucks)
  if (isDragEnabled) {
    let lpTimer = null;
    el.addEventListener('pointerdown', (e) => {
      if (bulkSelectMode) {
        // Already in bulk mode — prepare for potential drag but don't select yet
        e.preventDefault();
        bulkDragging = false;
        bulkSuppressClick = false;
        bulkDragAnchorId = btn.id;
        bulkDragPrevRange = new Set();
        el.setPointerCapture(e.pointerId);
        return;
      }
      lpTimer = setTimeout(() => {
        lpTimer = null;
        enterBulkSelectMode();
        bulkSuppressClick = true;
        bulkDragAnchorId = btn.id;
        bulkDragPrevRange = new Set();
        bulkSelectedIds.add(btn.id);
        bulkDragPrevRange.add(btn.id);
        lastSelectedId = btn.id;
        updateBulkVisuals();
        updateBulkToolbar();
        el.setPointerCapture(e.pointerId);
      }, 500);
    });
    el.addEventListener('pointermove', (e) => {
      if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
      if (!bulkDragAnchorId) return;
      const elemUnder = document.elementFromPoint(e.clientX, e.clientY);
      if (!elemUnder) return;
      const puck = elemUnder.closest('.sound-puck[data-btn-id]');
      if (!puck) return;
      const hoveredId = puck.dataset.btnId;
      if (!hoveredId || !bulkDragAnchorId) return;
      // Only start actual drag when pointer moves to a different puck
      if (!bulkDragging && hoveredId !== bulkDragAnchorId) {
        bulkDragging = true;
        bulkSuppressClick = true;
        bulkSelectedIds.add(bulkDragAnchorId);
        bulkDragPrevRange.add(bulkDragAnchorId);
      }
      if (!bulkDragging) return;
      // Compute range from anchor to hovered in DOM order
      const allPucks = Array.from(document.querySelectorAll('#main .sound-puck[data-btn-id]'));
      const allIds = allPucks.map(p => p.dataset.btnId);
      const anchorIdx = allIds.indexOf(bulkDragAnchorId);
      const hoverIdx = allIds.indexOf(hoveredId);
      if (anchorIdx === -1 || hoverIdx === -1) return;
      const start = Math.min(anchorIdx, hoverIdx);
      const end = Math.max(anchorIdx, hoverIdx);
      const newRange = new Set();
      for (let i = start; i <= end; i++) newRange.add(allIds[i]);
      bulkDragPrevRange.forEach(id => {
        if (!newRange.has(id)) bulkSelectedIds.delete(id);
      });
      newRange.forEach(id => bulkSelectedIds.add(id));
      bulkDragPrevRange = newRange;
      lastSelectedId = hoveredId;
      updateBulkVisuals();
      updateBulkToolbar();
    });
    el.addEventListener('pointerup', (e) => {
      if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
      bulkDragging = false;
      bulkDragAnchorId = null;
      bulkDragPrevRange = new Set();
      try { el.releasePointerCapture(e.pointerId); } catch(_) {}
    });
    el.addEventListener('pointercancel', (e) => {
      if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
      bulkDragging = false;
      bulkDragAnchorId = null;
      bulkDragPrevRange = new Set();
      try { el.releasePointerCapture(e.pointerId); } catch(_) {}
    });
  }

  el.addEventListener('click', async (e) => {
    if (bulkSelectMode) {
      e.stopPropagation();
      if (bulkSuppressClick) {
        bulkSuppressClick = false;
        return;
      }
      bulkToggleSelect(btn.id, e.shiftKey);
      return;
    }
    if (downloadingSet.has(btn.id)) return;
    if (isUrl(btn.source) && !btn.resolvedPath) {
      const resolved = await downloadAndResolve(btn);
      if (!resolved) return;
    }
    playSound(btn, el);
  });

  el.addEventListener('contextmenu', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (bulkSelectMode) return; // No context menu in bulk mode
    const items = [];
    items.push({ label: '\u270F Edit', action: () => openEditButtonModal(btn) });
    items.push({ label: btn.favorite ? '\u2606 Unfavorite' : '\u2605 Favorite', cls: 'favorite', action: () => { btn.favorite = !btn.favorite; saveConfig(); renderAll(); } });

    // Loop submenu
    const hasLoop = btn.loopInterval !== null;
    const loopActive = !!activeLoops[btn.id];
    const loopLabel = loopActive ? '\u21BB Stop Loop' : (hasLoop ? '\u21BB Start Loop' : '\u21BB Loop');
    items.push({ label: loopLabel, action: () => {
      if (loopActive) {
        // Stop loop
        stopButton(btn.id);
      } else if (hasLoop) {
        // Start loop with current settings
        toggleLoop(btn, el);
      } else {
        // No loop set — open config
        openLoopModal(btn);
      }
    }});

    // Loop config
    items.push({ label: '\u2699 Loop Settings', action: () => openLoopModal(btn) });

    items.push('---');
    items.push({ label: '\uD83D\uDDD1 Delete', danger: true, action: () => { config.buttons = config.buttons.filter(b => b !== btn); saveConfig(); renderAll(); } });
    if (isButtonPlaying(btn.id)) {
      items.push('---');
      items.push({ label: '\u25A0 Stop', danger: true, action: () => { stopButton(btn.id); } });
    }
    showContextMenu(e.clientX, e.clientY, items);
  });

  container.appendChild(el);
}

// Drag state
let dragSrcBtnId = null;

function reorderButton(srcId, targetId, targetCatId) {
  const srcBtn = config.buttons.find(b => b.id === srcId);
  if (!srcBtn) return;

  const srcIdx = config.buttons.indexOf(srcBtn);
  const origTargetIdx = config.buttons.findIndex(b => b.id === targetId);
  srcBtn.category = targetCatId;

  // Remove src first
  config.buttons.splice(srcIdx, 1);

  // Find target's new index (shifted after removal)
  let targetIdx = config.buttons.findIndex(b => b.id === targetId);

  // Use original indices to determine direction
  if (srcIdx < origTargetIdx) {
    // Dragging forward: insert after target
    config.buttons.splice(targetIdx + 1, 0, srcBtn);
  } else {
    // Dragging backward: insert before target
    config.buttons.splice(targetIdx, 0, srcBtn);
  }

  saveConfig(); renderAll();
}

function moveButtonToCategory(srcId, catId) {
  const srcBtn = config.buttons.find(b => b.id === srcId);
  if (!srcBtn) return;
  srcBtn.category = catId;
  saveConfig(); renderAll();
}

function reorderFavorite(srcId, targetId) {
  const srcIdx = config.favoriteOrder.indexOf(srcId);
  const origTargetIdx = config.favoriteOrder.indexOf(targetId);
  if (srcIdx === -1 || origTargetIdx === -1) return;
  config.favoriteOrder.splice(srcIdx, 1);
  const newTargetIdx = config.favoriteOrder.indexOf(targetId);
  if (srcIdx < origTargetIdx) {
    config.favoriteOrder.splice(newTargetIdx + 1, 0, srcId);
  } else {
    config.favoriteOrder.splice(newTargetIdx, 0, srcId);
  }
  saveConfig(); renderAll();
}

function openLoopModal(btn) {
  const root = document.getElementById('modalRoot');
  const current = btn.loopInterval;
  const isRepeat = current === -1;
  const isRandom = current === -2;
  const isInterval = current !== null && current > 0;
  const intervalVal = isInterval ? current : 5;
  const randomMinVal = btn.loopRandomMin || 1;
  const randomMaxVal = btn.loopRandomMax || 5;

  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" style="width:320px;">
        <h2>Loop Settings</h2>
        <div class="modal-field">
          <label>Mode</label>
          <select id="loopMode" style="width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-family:var(--font-mono);font-size:12px;padding:7px 10px;outline:none;">
            <option value="none" ${current === null ? 'selected' : ''}>Off</option>
            <option value="repeat" ${isRepeat ? 'selected' : ''}>Repeat on End</option>
            <option value="interval" ${isInterval ? 'selected' : ''}>Every X Sec</option>
            <option value="random" ${isRandom ? 'selected' : ''}>Random Interval</option>
          </select>
        </div>
        <div class="modal-field" id="intervalField" style="display:${isInterval ? 'block' : 'none'};">
          <label>Sec</label>
          <input type="number" id="loopSeconds" value="${intervalVal}" min="0.1" step="0.1"
            style="width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-family:var(--font-mono);font-size:12px;padding:7px 10px;outline:none;">
        </div>
        <div class="modal-field" id="randomField" style="display:${isRandom ? 'block' : 'none'};">
          <label>Range (sec)</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="number" id="loopRandomMin" value="${randomMinVal}" min="0.1" step="0.1"
              style="flex:1;min-width:0;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-family:var(--font-mono);font-size:12px;padding:7px 10px;outline:none;">
            <span style="color:var(--text-3);font-family:var(--font-mono);font-size:13px;flex-shrink:0;">–</span>
            <input type="number" id="loopRandomMax" value="${randomMaxVal}" min="0.1" step="0.1"
              style="flex:1;min-width:0;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-family:var(--font-mono);font-size:12px;padding:7px 10px;outline:none;">
          </div>
        </div>
        <div class="modal-actions" style="justify-content:space-between;">
          <button class="cancel-btn" id="loopCopy" style="font-size:10px;padding:5px 10px;" title="Copy these loop settings to paste onto other buttons">📋 Copy</button>
          <div style="display:flex;gap:8px;">
            <button class="cancel-btn" id="loopCancel">Cancel</button>
            <button class="save-btn" id="loopSave">Save</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('loopMode').addEventListener('change', (e) => {
    document.getElementById('intervalField').style.display = e.target.value === 'interval' ? 'block' : 'none';
    document.getElementById('randomField').style.display = e.target.value === 'random' ? 'block' : 'none';
  });

  document.getElementById('loopCopy').addEventListener('click', () => {
    // Read current modal state to copy
    const mode = document.getElementById('loopMode').value;
    const copied = { loopInterval: null, loopRandomMin: 1, loopRandomMax: 5 };
    if (mode === 'none') copied.loopInterval = null;
    else if (mode === 'repeat') copied.loopInterval = -1;
    else if (mode === 'random') {
      copied.loopInterval = -2;
      let min = parseFloat(document.getElementById('loopRandomMin').value);
      let max = parseFloat(document.getElementById('loopRandomMax').value);
      if (isNaN(min) || min <= 0) min = 1;
      if (isNaN(max) || max <= 0) max = 5;
      if (min > max) { const tmp = min; min = max; max = tmp; }
      copied.loopRandomMin = min;
      copied.loopRandomMax = max;
    } else {
      const secs = parseFloat(document.getElementById('loopSeconds').value);
      copied.loopInterval = (isNaN(secs) || secs <= 0) ? 5 : secs;
    }
    copiedLoopSettings = copied;
    const copyBtn = document.getElementById('loopCopy');
    copyBtn.textContent = '✓ Copied';
    setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 1200);
  });

  document.getElementById('loopSave').addEventListener('click', () => {
    const mode = document.getElementById('loopMode').value;
    if (mode === 'none') btn.loopInterval = null;
    else if (mode === 'repeat') btn.loopInterval = -1;
    else if (mode === 'random') {
      btn.loopInterval = -2;
      let min = parseFloat(document.getElementById('loopRandomMin').value);
      let max = parseFloat(document.getElementById('loopRandomMax').value);
      if (isNaN(min) || min <= 0) min = 1;
      if (isNaN(max) || max <= 0) max = 5;
      if (min > max) { const tmp = min; min = max; max = tmp; }
      btn.loopRandomMin = min;
      btn.loopRandomMax = max;
    } else {
      const secs = parseFloat(document.getElementById('loopSeconds').value);
      btn.loopInterval = (isNaN(secs) || secs <= 0) ? 5 : secs;
    }
    saveConfig(); renderAll(); closeModal();
  });

  document.getElementById('loopCancel').addEventListener('click', closeModal);
  setupModalOverlayDismiss();
}

function renderCategory(cat, buttons) {
  const catBtns = buttons.filter(b => b.category === cat.id);
  const isCollapsed = collapsedCats.has(cat.id);
  const frame = document.createElement('div');
  frame.className = 'category-frame';
  frame.style.setProperty('--cat-color', cat.color);
  // Tinted background from category color
  const rgb = hexToRgb(cat.color);
  if (rgb) frame.style.background = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.06)`;
  frame.dataset.catId = cat.id;

  // Category drag-and-drop (reorder categories) — drag starts from header only
  frame.addEventListener('dragstart', (e) => {
    // Don't interfere with puck drags
    if (e.target.closest('.sound-puck')) return;
    if (!e.target.closest('.category-header')) { e.preventDefault(); return; }
    e.dataTransfer.setData('text/cat-id', cat.id);
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => frame.classList.add('dragging'));
  });
  frame.addEventListener('dragend', () => {
    frame.classList.remove('dragging');
    document.querySelectorAll('.cat-drag-over').forEach(x => x.classList.remove('cat-drag-over'));
  });
  frame.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('text/cat-id')) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      frame.classList.add('cat-drag-over');
    }
  });
  frame.addEventListener('dragleave', (e) => {
    if (!frame.contains(e.relatedTarget)) frame.classList.remove('cat-drag-over');
  });
  frame.addEventListener('drop', (e) => {
    frame.classList.remove('cat-drag-over');
    const srcCatId = e.dataTransfer.getData('text/cat-id');
    if (srcCatId && srcCatId !== cat.id) {
      e.preventDefault(); e.stopPropagation();
      reorderCategory(srcCatId, cat.id);
      return;
    }
  });

  const header = document.createElement('div');
  header.className = 'category-header';
  header.draggable = true;

  const foldBtn = document.createElement('button');
  foldBtn.className = 'category-fold' + (isCollapsed ? ' collapsed' : '');
  foldBtn.innerHTML = '\u25BC';
  foldBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (collapsedCats.has(cat.id)) collapsedCats.delete(cat.id);
    else collapsedCats.add(cat.id);
    renderAll();
  });

  header.appendChild(foldBtn);
  const dot = document.createElement('div'); dot.className = 'category-dot';
  header.appendChild(dot);
  const nameEl = document.createElement('div'); nameEl.className = 'category-name'; nameEl.textContent = cat.name;
  header.appendChild(nameEl);
  const countEl = document.createElement('div'); countEl.className = 'category-count';
  countEl.textContent = catBtns.length + ' sound' + (catBtns.length !== 1 ? 's' : '');
  header.appendChild(countEl);

  header.addEventListener('contextmenu', (e) => {
    e.preventDefault(); e.stopPropagation();
    showCategoryMenu(e, cat);
  });
  frame.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'category-grid' + (isCollapsed ? ' collapsed' : '');
  grid.dataset.catId = cat.id;

  grid.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('text/plain')) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      if (catBtns.length === 0) grid.classList.add('drag-over-empty');
    }
  });
  grid.addEventListener('dragleave', () => grid.classList.remove('drag-over-empty'));
  grid.addEventListener('drop', (e) => {
    grid.classList.remove('drag-over-empty');
    const srcId = e.dataTransfer.getData('text/plain');
    if (srcId) {
      e.preventDefault(); e.stopPropagation();
      moveButtonToCategory(srcId, cat.id);
    }
  });

  grid.addEventListener('contextmenu', (e) => {
    if (e.target === grid || e.target.classList.contains('category-empty')) {
      e.preventDefault(); e.stopPropagation();
      showCategoryMenu(e, cat);
    }
  });

  if (catBtns.length === 0) {
    grid.innerHTML = '<div class="category-empty">Right-click to add a sound</div>';
  } else {
    catBtns.forEach(btn => renderPuck(btn, grid));
  }
  frame.appendChild(grid);
  return frame;
}

function reorderCategory(srcId, targetId) {
  const srcIdx = config.categories.findIndex(c => c.id === srcId);
  const origTargetIdx = config.categories.findIndex(c => c.id === targetId);
  if (srcIdx === -1 || origTargetIdx === -1) return;
  const [src] = config.categories.splice(srcIdx, 1);
  const newTargetIdx = config.categories.findIndex(c => c.id === targetId);
  // Use original indices to determine direction
  if (srcIdx < origTargetIdx) {
    config.categories.splice(newTargetIdx + 1, 0, src);
  } else {
    config.categories.splice(newTargetIdx, 0, src);
  }
  saveConfig(); renderAll();
}

function showCategoryMenu(e, cat) {
  showContextMenu(e.clientX, e.clientY, [
    { label: '+ Add Sound Here', action: () => openEditButtonModal(null, cat.id) },
    '---',
    { label: '\u270F Edit Category', action: () => openEditCategoryModal(cat) },
    { label: '\uD83D\uDDD1 Delete Category', danger: true, action: () => {
      config.categories = config.categories.filter(c => c !== cat);
      config.buttons = config.buttons.filter(b => b.category !== cat.id);
      saveConfig(); renderAll();
    }},
  ]);
}

// ═══════════════════════════════════════════════════════════════════════
// BULK SELECT MODE
// ═══════════════════════════════════════════════════════════════════════
function enterBulkSelectMode() {
  if (bulkSelectMode) return;
  bulkSelectMode = true;
  bulkSelectedIds.clear();
  lastSelectedId = null;
  document.getElementById('main').classList.add('shake-mode');
  document.getElementById('bulkToolbar').classList.add('show');
  // Disable draggable on existing pucks without re-rendering (preserves pointer capture)
  document.querySelectorAll('#main .sound-puck[data-btn-id]').forEach(el => {
    el.draggable = false;
    el.style.setProperty('--shake-delay', Math.floor(Math.random() * 250));
  });
  updateBulkToolbar();
}

function exitBulkSelectMode() {
  bulkSelectMode = false;
  bulkSelectedIds.clear();
  lastSelectedId = null;
  document.getElementById('main').classList.remove('shake-mode');
  document.getElementById('bulkToolbar').classList.remove('show');
  renderAll();
}

function bulkToggleSelect(btnId, shiftKey) {
  if (shiftKey && lastSelectedId) {
    // Range select: use DOM order (visual order) instead of config.buttons order
    const allPucks = Array.from(document.querySelectorAll('#main .sound-puck[data-btn-id]'));
    const allIds = allPucks.map(el => el.dataset.btnId);
    const fromIdx = allIds.indexOf(lastSelectedId);
    const toIdx = allIds.indexOf(btnId);
    if (fromIdx !== -1 && toIdx !== -1) {
      const start = Math.min(fromIdx, toIdx);
      const end = Math.max(fromIdx, toIdx);
      for (let i = start; i <= end; i++) {
        bulkSelectedIds.add(allIds[i]);
      }
    }
  } else {
    if (bulkSelectedIds.has(btnId)) {
      bulkSelectedIds.delete(btnId);
    } else {
      bulkSelectedIds.add(btnId);
    }
    lastSelectedId = btnId;
  }
  // Update visuals without full re-render
  document.querySelectorAll('.sound-puck[data-btn-id]').forEach(el => {
    if (bulkSelectedIds.has(el.dataset.btnId)) {
      el.classList.add('bulk-selected');
    } else {
      el.classList.remove('bulk-selected');
    }
  });
  updateBulkToolbar();
}

function updateBulkVisuals() {
  document.querySelectorAll('.sound-puck[data-btn-id]').forEach(el => {
    if (bulkSelectedIds.has(el.dataset.btnId)) {
      el.classList.add('bulk-selected');
    } else {
      el.classList.remove('bulk-selected');
    }
  });
}

function updateBulkToolbar() {
  const pasteBtn = document.getElementById('bulkPaste');
  pasteBtn.disabled = !copiedLoopSettings || bulkSelectedIds.size === 0;
  const count = bulkSelectedIds.size;
  document.getElementById('bulkDelete').textContent = count > 0 ? `Delete (${count})` : 'Delete';

  // Start Loop: enabled if any selected button has a loop configured but isn't looping
  const startBtn = document.getElementById('bulkStartLoop');
  const hasStartable = [...bulkSelectedIds].some(id => {
    const btn = config.buttons.find(b => b.id === id);
    return btn && btn.loopInterval !== null && !activeLoops[id];
  });
  startBtn.disabled = !hasStartable;

  // Stop Loop: enabled if any selected button is currently looping
  const stopBtn = document.getElementById('bulkStopLoop');
  const hasStoppable = [...bulkSelectedIds].some(id => !!activeLoops[id]);
  stopBtn.disabled = !hasStoppable;
}

function bulkPasteLoop() {
  if (!copiedLoopSettings || bulkSelectedIds.size === 0) return;
  config.buttons.forEach(btn => {
    if (bulkSelectedIds.has(btn.id)) {
      btn.loopInterval = copiedLoopSettings.loopInterval;
      btn.loopRandomMin = copiedLoopSettings.loopRandomMin;
      btn.loopRandomMax = copiedLoopSettings.loopRandomMax;
    }
  });
  saveConfig();
  exitBulkSelectMode();
}

function bulkDeleteSelected() {
  if (bulkSelectedIds.size === 0) return;
  // Stop any playing/looping sounds for these buttons
  bulkSelectedIds.forEach(id => stopButton(id));
  config.buttons = config.buttons.filter(b => !bulkSelectedIds.has(b.id));
  saveConfig();
  exitBulkSelectMode();
}

function bulkStartLoop() {
  if (bulkSelectedIds.size === 0) return;
  bulkSelectedIds.forEach(id => {
    const btn = config.buttons.find(b => b.id === id);
    if (!btn || btn.loopInterval === null) return; // skip buttons with no loop configured
    if (activeLoops[id]) return; // already looping
    const puckEl = document.querySelector(`.sound-puck[data-btn-id="${id}"]`);
    startLoop(btn, puckEl);
  });
  exitBulkSelectMode();
}

function bulkStopLoop() {
  if (bulkSelectedIds.size === 0) return;
  bulkSelectedIds.forEach(id => {
    if (activeLoops[id]) {
      stopButton(id);
    }
  });
  exitBulkSelectMode();
}

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const sidebar = document.getElementById('sidebarButtons');
  sidebar.innerHTML = '';

  // Build ordered favorites list
  const favBtns = config.buttons.filter(b => b.favorite);
  // Clean up favoriteOrder: remove ids that are no longer favorites
  config.favoriteOrder = config.favoriteOrder.filter(id => favBtns.some(b => b.id === id));
  // Add any new favorites not yet in the order
  favBtns.forEach(b => {
    if (!config.favoriteOrder.includes(b.id)) config.favoriteOrder.push(b.id);
  });
  // Sort by favoriteOrder
  const orderedFavs = config.favoriteOrder
    .map(id => favBtns.find(b => b.id === id))
    .filter(Boolean);

  if (orderedFavs.length === 0) {
    sidebar.innerHTML = '<div class="sidebar-empty">Right-click a sound and choose Favorite to pin it here</div>';
  } else {
    orderedFavs.forEach(btn => {
      // Render puck with drag enabled for favorites reordering
      renderPuck(btn, sidebar, false);
      const el = sidebar.lastElementChild;
      el.draggable = true;

      el.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/fav-id', btn.id);
        e.dataTransfer.effectAllowed = 'move';
        el.classList.add('dragging');
        e.stopPropagation();
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        sidebar.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
      });
      el.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('text/fav-id')) {
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          el.classList.add('drag-over');
        }
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', (e) => {
        el.classList.remove('drag-over');
        const srcId = e.dataTransfer.getData('text/fav-id');
        if (srcId && srcId !== btn.id) {
          e.preventDefault(); e.stopPropagation();
          reorderFavorite(srcId, btn.id);
        }
      });
    });
  }

  config.categories.forEach(cat => {
    main.appendChild(renderCategory(cat, config.buttons));
  });

  document.getElementById('volumeSlider').value = config.volume;
}

// CONTEXT MENU
// ═══════════════════════════════════════════════════════════════════════
function showContextMenu(x, y, items) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item === '---') {
      menu.appendChild(Object.assign(document.createElement('div'), { className: 'ctx-sep' }));
    } else {
      const btn = document.createElement('button');
      btn.className = 'ctx-item' + (item.danger ? ' danger' : '') + (item.cls ? ' ' + item.cls : '');
      btn.textContent = item.label;
      btn.addEventListener('click', () => { hideContextMenu(); item.action(); });
      menu.appendChild(btn);
    }
  });
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
  menu.classList.add('show');
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    if (r.right > window.innerWidth) menu.style.left = (x - r.width) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top = (y - r.height) + 'px';
  });
}
function hideContextMenu() { document.getElementById('ctxMenu').classList.remove('show'); }
// Require a full click (mousedown then mouseup) outside the menu to dismiss it
let ctxMouseDownOutside = false;
document.addEventListener('mousedown', (e) => {
  const menu = document.getElementById('ctxMenu');
  if (menu.classList.contains('show') && !menu.contains(e.target)) {
    ctxMouseDownOutside = true;
  } else {
    ctxMouseDownOutside = false;
  }
});
document.addEventListener('mouseup', (e) => {
  const menu = document.getElementById('ctxMenu');
  if (ctxMouseDownOutside && menu.classList.contains('show') && !menu.contains(e.target)) {
    hideContextMenu();
  }
  ctxMouseDownOutside = false;
});

function closeModal() { document.getElementById('modalRoot').innerHTML = ''; keybindListening = false; keybindLiveCallback = null; }

// Require full click (mousedown+mouseup on overlay) to dismiss modal
function setupModalOverlayDismiss() {
  const overlay = document.getElementById('modalOverlay');
  if (!overlay) return;
  let mdOnOverlay = false;
  overlay.addEventListener('mousedown', (e) => { mdOnOverlay = (e.target.id === 'modalOverlay'); });
  overlay.addEventListener('mouseup', (e) => {
    if (mdOnOverlay && e.target.id === 'modalOverlay') closeModal();
    mdOnOverlay = false;
  });
}

let keybindListening = false;
let keybindCallback = null;
let keybindLiveCallback = null; // shows live combo as keys are held

          <div class="modal-field">

              <input type="text" class="gain-val" id="gainVal" value="${(btn.gainDb || 0) >= 0 ? '+' : ''}${btn.gainDb || 0} dB">

          <div class="keybind-box" id="keybindBox">${btn.keybind || 'Click to set keybind...'}</div>
          <div class="keybind-clear" id="keybindClear">clear keybind</div>
        </div>

          <button class="cancel-btn" id="mCancel">Cancel</button>
          <button class="save-btn" id="mSave">Save</button>
        </div>
      </div>
    </div>
  `;

  // Colors
  const colorsEl = document.getElementById('mColors');

  // Backward compat: if button uses a hex color not in customColors, add it
  if (btn.color && btn.color.startsWith('#') && !config.customColors.includes(btn.color)) {
    config.customColors.push(btn.color);
    saveConfig();
  }

  let selectedColor = btn.color || 'gray'; // tracks the currently selected color across re-renders
  // If selectedColor is a custom hex, track which index it came from to handle duplicates
  let selectedCustomIdx = -1;
  if (selectedColor.startsWith('#')) {
    selectedCustomIdx = config.customColors.indexOf(selectedColor);
  }

  function renderColorSwatches() {
    colorsEl.innerHTML = '';
    let hasSelected = false;

    // Built-in colors
    Object.entries(PUCK_COLORS).forEach(([name, c]) => {
      const isSelected = !hasSelected && selectedColor === name;
      if (isSelected) hasSelected = true;
      const opt = document.createElement('div');
      opt.className = 'color-opt' + (isSelected ? ' selected' : '');
      opt.style.background = c.main; opt.style.color = c.main;
      opt.dataset.color = name;
      opt.addEventListener('click', () => {
        selectedColor = name;
        selectedCustomIdx = -1;
        colorsEl.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
      colorsEl.appendChild(opt);
    });

    // Custom colors from config
    config.customColors.forEach((hex, idx) => {
      // Only select the first matching swatch (or the specific index if tracked)
      const isSelected = !hasSelected && (
        (selectedCustomIdx >= 0 && idx === selectedCustomIdx) ||
        (selectedCustomIdx < 0 && selectedColor === hex)
      );
      if (isSelected) hasSelected = true;
      const opt = document.createElement('div');
      opt.className = 'color-opt' + (isSelected ? ' selected' : '');
      opt.style.background = hex; opt.style.color = hex;
      opt.dataset.color = hex;
      opt.addEventListener('click', () => {
        selectedColor = hex;
        selectedCustomIdx = idx;
        colorsEl.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
      opt.addEventListener('contextmenu', (e) => {
        e.preventDefault(); e.stopPropagation();
        showContextMenu(e.clientX, e.clientY, [
          { label: '\u270F Change Color', action: () => {
            openCustomColorEditor(hex, idx);
          }},
          { label: '\uD83D\uDDD1 Remove Color', danger: true, action: () => {
            // If the removed color was selected, keep selectedColor as-is
            // (button keeps its color, just the palette entry is gone)
            if (selectedCustomIdx === idx) {
              selectedCustomIdx = -1; // no longer tracking an index
            } else if (selectedCustomIdx > idx) {
              selectedCustomIdx--; // adjust for shifted indices
            }
            config.customColors.splice(idx, 1);
            saveConfig();
            renderColorSwatches();
          }},
        ]);
      });
      colorsEl.appendChild(opt);
    });

    // + button to add new custom color
    const addBtn = document.createElement('div');
    addBtn.className = 'color-opt';
    addBtn.style.background = 'var(--bg-card)'; addBtn.style.border = '2px dashed var(--text-3)';
    addBtn.style.display = 'flex'; addBtn.style.alignItems = 'center'; addBtn.style.justifyContent = 'center';
    addBtn.style.fontSize = '14px'; addBtn.style.color = 'var(--text-3)'; addBtn.style.fontWeight = 'bold';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => {
      // Add a new custom color and open the editor for it
      const newHex = '#ff6600';
      config.customColors.push(newHex);
      selectedColor = newHex;
      selectedCustomIdx = config.customColors.length - 1;
      saveConfig();
      renderColorSwatches();
      // Auto-open the editor for the new color
      const newIdx = config.customColors.length - 1;
      openCustomColorEditor(newHex, newIdx);
    });
    colorsEl.appendChild(addBtn);
  }

  function openCustomColorEditor(currentHex, idx) {
    // Remove any existing inline editor
    const existing = colorsEl.querySelector('.custom-color-editor');
    if (existing) existing.remove();

    const wrap = document.createElement('div');
    wrap.className = 'custom-color-editor';
    wrap.style.cssText = 'display:flex;align-items:center;gap:6px;width:100%;margin-top:6px;';
    const inp = document.createElement('input');
    inp.type = 'color'; inp.value = currentHex;
    inp.style.cssText = 'width:36px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);cursor:pointer;padding:1px;';
    const applyBtn = document.createElement('button');
    applyBtn.textContent = 'Apply';
    applyBtn.style.cssText = 'background:var(--accent);color:#000;border:none;border-radius:6px;font-family:var(--font-mono);font-size:10px;font-weight:600;padding:4px 10px;cursor:pointer;';

    function doApply() {
      config.customColors[idx] = inp.value;
      selectedColor = inp.value;
      selectedCustomIdx = idx;
      saveConfig();
      renderColorSwatches();
    }
    applyBtn.addEventListener('click', doApply);
    inp.addEventListener('change', doApply);

    wrap.appendChild(inp);
    wrap.appendChild(applyBtn);
    colorsEl.appendChild(wrap);
  }

  renderColorSwatches();

  // Browse
  document.getElementById('mBrowse').addEventListener('click', async () => {
    const files = await pickFiles();
    if (files && files.length > 0) {
      const first = typeof files[0] === 'string' ? files[0] : files[0].url;
      document.getElementById('mSource').value = first;
      if (!document.getElementById('mName').value) {
        const name = typeof files[0] === 'string'
          ? files[0].split(/[/\\]/).pop().replace(/\.[^.]+$/, '')
          : files[0].name.replace(/\.[^.]+$/, '');
        document.getElementById('mName').value = name;
      }
    }
  });

  // Volume slider
  const volSlider = document.getElementById('mVolume');
  const volVal = document.getElementById('mVolVal');
  volSlider.addEventListener('input', () => { volVal.textContent = volSlider.value + '%'; });

  // Gain +/- buttons
  let currentGain = btn.gainDb || 0;
  const gainValEl = document.getElementById('gainVal');
  function updateGainDisplay() {
    gainValEl.value = (currentGain >= 0 ? '+' : '') + currentGain + ' dB';
  }
  document.getElementById('gainUp').addEventListener('click', () => { currentGain = currentGain + 1; updateGainDisplay(); });
  document.getElementById('gainDown').addEventListener('click', () => { currentGain = currentGain - 1; updateGainDisplay(); });

  // Allow direct editing of the dB value
  gainValEl.addEventListener('change', () => {
    const raw = gainValEl.value.replace(/[^0-9.\-+]/g, '').trim();
    const parsed = parseFloat(raw);
    if (!isNaN(parsed)) {
      currentGain = Math.round(parsed);
    }
    updateGainDisplay();
  });
  gainValEl.addEventListener('focus', () => {
    // Select all text for easy overwrite
    gainValEl.select();
  });

  // Keybind recorder
  let recordedKeybind = btn.keybind || '';
  const keybindBox = document.getElementById('keybindBox');

  // Keybind recording: click starts listening.
  // Problem: setting Mouse1 as keybind → mouseup fires → click fires → restarts listening.
  // Fix: after keybind is set, skip the very next click event on this box.
  let skipNextClick = false;

  keybindBox.addEventListener('click', (e) => {
    if (skipNextClick) { skipNextClick = false; return; }
    if (keybindListening) return;
    keybindListening = true;
    appHeldModifiers = { ctrl: false, shift: false, alt: false };
    appPeakModifierCombo = '';
    appHadNonModifier = false;
    keybindBox.classList.add('listening');
    keybindBox.textContent = 'Press any key or mouse button...';

    keybindLiveCallback = (combo) => {
      keybindBox.textContent = combo + '+...';
    };

    keybindCallback = (combo, isFinal) => {
      if (!isFinal) return;
      recordedKeybind = combo;
      keybindBox.textContent = combo;
      keybindBox.classList.remove('listening');
      keybindListening = false;
      keybindCallback = null;
      keybindLiveCallback = null;
      appHeldModifiers = { ctrl: false, shift: false, alt: false };
      // If this was a mouse keybind, the mouseup+click will follow — skip it
      if (combo.includes('Mouse')) skipNextClick = true;
    };
  });

  // Capture mouse buttons when listening — non-left on the box, or any button anywhere
  keybindBox.addEventListener('mousedown', (e) => {
    if (!keybindListening) return;
    if (e.button === 0) return; // left-click on the box is handled differently (see below)
    e.preventDefault(); e.stopPropagation();
    const btnMap = { 0: 'Mouse1', 1: 'Mouse3', 2: 'Mouse2', 3: 'Mouse4', 4: 'Mouse5' };
    const mBtn = btnMap[e.button] || `Mouse${e.button}`;
    const parts = [];
    if (e.ctrlKey) parts.push('Ctrl');
    if (e.shiftKey) parts.push('Shift');
    if (e.altKey) parts.push('Alt');
    parts.push(mBtn);
    if (keybindCallback) keybindCallback(parts.join('+'), true);
  });

  // For left-click (Mouse1): capture it when clicking OUTSIDE the keybind box while listening
  document.addEventListener('mousedown', (e) => {
    if (!keybindListening) return;
    // Skip clicks on keybind box itself (left-click there does nothing while listening),
    // clear button, save, cancel
    if (e.target === keybindBox) return;
    if (e.target.id === 'keybindClear' || e.target.id === 'mSave' || e.target.id === 'mCancel') return;
    if (e.target.closest && (e.target.closest('.modal-actions') || e.target.closest('.keybind-clear'))) return;

    e.preventDefault(); e.stopPropagation();
    const btnMap = { 0: 'Mouse1', 1: 'Mouse3', 2: 'Mouse2', 3: 'Mouse4', 4: 'Mouse5' };
    const mBtn = btnMap[e.button] || `Mouse${e.button}`;
    const parts = [];
    if (e.ctrlKey) parts.push('Ctrl');
    if (e.shiftKey) parts.push('Shift');
    if (e.altKey) parts.push('Alt');
    parts.push(mBtn);
    if (keybindCallback) keybindCallback(parts.join('+'), true);
  }, true);

  // Prevent context menu on right-click in keybind box
  keybindBox.addEventListener('contextmenu', (e) => {
    if (keybindListening) { e.preventDefault(); e.stopPropagation(); }
  });

  document.getElementById('keybindClear').addEventListener('click', () => {
    recordedKeybind = '';
    keybindBox.textContent = 'Click to set keybind...';
    keybindBox.classList.remove('listening');
    keybindListening = false;
    keybindCallback = null;
    keybindLiveCallback = null;
    appHeldModifiers = { ctrl: false, shift: false, alt: false };
  });

  // Save
  document.getElementById('mSave').addEventListener('click', () => {
    const name = document.getElementById('mName').value.trim();
    const source = document.getElementById('mSource').value.trim();
    if (!name || !source) return;
    const color = selectedColor;
    const category = document.getElementById('mCategory').value;
    const volume = parseInt(volSlider.value);
    const gainDb = currentGain;

    if (isEdit) {
      Object.assign(btn, { name, source, color, category, keybind: recordedKeybind, volume, gainDb });
    } else {
      config.buttons.push({
        id: uid(), name, source, color, category,
        keybind: recordedKeybind, favorite: false, volume, gainDb, loopInterval: null
      });
    }
    keybindListening = false; keybindCallback = null; keybindLiveCallback = null;
    saveConfig(); renderAll(); closeModal();
  });

  document.getElementById('mCancel').addEventListener('click', closeModal);
  setupModalOverlayDismiss();
  document.getElementById('mName').focus();
}
